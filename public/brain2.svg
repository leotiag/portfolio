<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d47a1"></stop>
      <stop offset="100%" stop-color="#06142a"></stop>
    </radialGradient>

    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4cc9ff" stop-opacity="0.05"></stop>
      <stop offset="50%" stop-color="#4cc9ff" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#4cc9ff" stop-opacity="0.05"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"></rect>

  <!-- NETWORK -->
  <g stroke="url(#lineGlow)" stroke-width="1" filter="url(#glow)">

    <!-- Auto-generated dense mesh pattern -->
    <!-- Horizontal layers -->
    <!-- Row 1 -->
    <line x1="100" y1="120" x2="300" y2="180"></line>
    <line x1="300" y1="180" x2="520" y2="140"></line>
    <line x1="520" y1="140" x2="740" y2="200"></line>
    <line x1="740" y1="200" x2="960" y2="150"></line>
    <line x1="960" y1="150" x2="1180" y2="210"></line>
    <line x1="1180" y1="210" x2="1400" y2="160"></line>

    <!-- Row 2 -->
    <line x1="150" y1="320" x2="370" y2="270"></line>
    <line x1="370" y1="270" x2="600" y2="340"></line>
    <line x1="600" y1="340" x2="830" y2="280"></line>
    <line x1="830" y1="280" x2="1060" y2="350"></line>
    <line x1="1060" y1="350" x2="1300" y2="290"></line>

    <!-- Row 3 -->
    <line x1="200" y1="520" x2="420" y2="470"></line>
    <line x1="420" y1="470" x2="650" y2="540"></line>
    <line x1="650" y1="540" x2="880" y2="480"></line>
    <line x1="880" y1="480" x2="1110" y2="560"></line>
    <line x1="1110" y1="560" x2="1350" y2="500"></line>

    <!-- Row 4 -->
    <line x1="250" y1="720" x2="480" y2="670"></line>
    <line x1="480" y1="670" x2="710" y2="740"></line>
    <line x1="710" y1="740" x2="940" y2="690"></line>
    <line x1="940" y1="690" x2="1180" y2="760"></line>
    <line x1="1180" y1="760" x2="1400" y2="710"></line>

    <!-- Cross connections -->
    <line x1="300" y1="180" x2="370" y2="270"></line>
    <line x1="520" y1="140" x2="600" y2="340"></line>
    <line x1="740" y1="200" x2="830" y2="280"></line>
    <line x1="960" y1="150" x2="1060" y2="350"></line>
    <line x1="1180" y1="210" x2="1300" y2="290"></line>

    <line x1="370" y1="270" x2="420" y2="470"></line>
    <line x1="600" y1="340" x2="650" y2="540"></line>
    <line x1="830" y1="280" x2="880" y2="480"></line>
    <line x1="1060" y1="350" x2="1110" y2="560"></line>
    <line x1="1300" y1="290" x2="1350" y2="500"></line>

    <line x1="420" y1="470" x2="480" y2="670"></line>
    <line x1="650" y1="540" x2="710" y2="740"></line>
    <line x1="880" y1="480" x2="940" y2="690"></line>
    <line x1="1110" y1="560" x2="1180" y2="760"></line>

    <!-- Extra diagonal mesh -->
    <line x1="100" y1="120" x2="420" y2="470"></line>
    <line x1="300" y1="180" x2="650" y2="540"></line>
    <line x1="520" y1="140" x2="880" y2="480"></line>
    <line x1="740" y1="200" x2="1110" y2="560"></line>
    <line x1="960" y1="150" x2="1350" y2="500"></line>

  </g>

  <!-- NODES -->
  <g fill="#4cc9ff" filter="url(#glow)">
    <!-- Row 1 -->
    <circle cx="100" cy="120" r="4"></circle>
    <circle cx="300" cy="180" r="4"></circle>
    <circle cx="520" cy="140" r="4"></circle>
    <circle cx="740" cy="200" r="4"></circle>
    <circle cx="960" cy="150" r="4"></circle>
    <circle cx="1180" cy="210" r="4"></circle>
    <circle cx="1400" cy="160" r="4"></circle>

    <!-- Row 2 -->
    <circle cx="150" cy="320" r="4"></circle>
    <circle cx="370" cy="270" r="4"></circle>
    <circle cx="600" cy="340" r="4"></circle>
    <circle cx="830" cy="280" r="4"></circle>
    <circle cx="1060" cy="350" r="4"></circle>
    <circle cx="1300" cy="290" r="4"></circle>

    <!-- Row 3 -->
    <circle cx="200" cy="520" r="4"></circle>
    <circle cx="420" cy="470" r="4"></circle>
    <circle cx="650" cy="540" r="4"></circle>
    <circle cx="880" cy="480" r="4"></circle>
    <circle cx="1110" cy="560" r="4"></circle>
    <circle cx="1350" cy="500" r="4"></circle>

    <!-- Row 4 -->
    <circle cx="250" cy="720" r="4"></circle>
    <circle cx="480" cy="670" r="4"></circle>
    <circle cx="710" cy="740" r="4"></circle>
    <circle cx="940" cy="690" r="4"></circle>
    <circle cx="1180" cy="760" r="4"></circle>
    <circle cx="1400" cy="710" r="4"></circle>

  </g>

</svg>