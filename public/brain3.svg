<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0b3d91"></stop>
      <stop offset="100%" stop-color="#030812"></stop>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"></rect>

  <!-- CONNECTIONS -->
  <g stroke="#4cc9ff" stroke-width="0.8" stroke-opacity="0.35">

    <!-- Dense mesh horizontal -->
    <!-- Row 1 -->
    <line x1="100" y1="120" x2="250" y2="180"></line>
    <line x1="250" y1="180" x2="400" y2="140"></line>
    <line x1="400" y1="140" x2="550" y2="200"></line>
    <line x1="550" y1="200" x2="700" y2="160"></line>
    <line x1="700" y1="160" x2="850" y2="220"></line>
    <line x1="850" y1="220" x2="1000" y2="180"></line>
    <line x1="1000" y1="180" x2="1150" y2="240"></line>
    <line x1="1150" y1="240" x2="1300" y2="200"></line>
    <line x1="1300" y1="200" x2="1450" y2="260"></line>

    <!-- Row 2 -->
    <line x1="120" y1="350" x2="300" y2="300"></line>
    <line x1="300" y1="300" x2="480" y2="360"></line>
    <line x1="480" y1="360" x2="660" y2="320"></line>
    <line x1="660" y1="320" x2="840" y2="380"></line>
    <line x1="840" y1="380" x2="1020" y2="340"></line>
    <line x1="1020" y1="340" x2="1200" y2="400"></line>
    <line x1="1200" y1="400" x2="1380" y2="360"></line>

    <!-- Row 3 -->
    <line x1="150" y1="600" x2="330" y2="550"></line>
    <line x1="330" y1="550" x2="510" y2="610"></line>
    <line x1="510" y1="610" x2="690" y2="570"></line>
    <line x1="690" y1="570" x2="870" y2="630"></line>
    <line x1="870" y1="630" x2="1050" y2="590"></line>
    <line x1="1050" y1="590" x2="1230" y2="650"></line>
    <line x1="1230" y1="650" x2="1410" y2="610"></line>

    <!-- Cross dense mesh -->
    <line x1="250" y1="180" x2="300" y2="300"></line>
    <line x1="400" y1="140" x2="480" y2="360"></line>
    <line x1="550" y1="200" x2="660" y2="320"></line>
    <line x1="700" y1="160" x2="840" y2="380"></line>
    <line x1="850" y1="220" x2="1020" y2="340"></line>
    <line x1="1000" y1="180" x2="1200" y2="400"></line>
    <line x1="1150" y1="240" x2="1380" y2="360"></line>

    <line x1="300" y1="300" x2="330" y2="550"></line>
    <line x1="480" y1="360" x2="510" y2="610"></line>
    <line x1="660" y1="320" x2="690" y2="570"></line>
    <line x1="840" y1="380" x2="870" y2="630"></line>
    <line x1="1020" y1="340" x2="1050" y2="590"></line>
    <line x1="1200" y1="400" x2="1230" y2="650"></line>

    <!-- Extra diagonals -->
    <line x1="100" y1="120" x2="480" y2="360"></line>
    <line x1="250" y1="180" x2="660" y2="320"></line>
    <line x1="400" y1="140" x2="840" y2="380"></line>
    <line x1="550" y1="200" x2="1020" y2="340"></line>
    <line x1="700" y1="160" x2="1200" y2="400"></line>
    <line x1="850" y1="220" x2="1380" y2="360"></line>

    <line x1="300" y1="300" x2="690" y2="570"></line>
    <line x1="480" y1="360" x2="870" y2="630"></line>
    <line x1="660" y1="320" x2="1050" y2="590"></line>
    <line x1="840" y1="380" x2="1230" y2="650"></line>

  </g>

  <!-- NODES -->
  <g fill="#4cc9ff" filter="url(#glow)">

    <!-- Row 1 -->
    <circle cx="100" cy="120" r="3"></circle>
    <circle cx="250" cy="180" r="3"></circle>
    <circle cx="400" cy="140" r="3"></circle>
    <circle cx="550" cy="200" r="3"></circle>
    <circle cx="700" cy="160" r="3"></circle>
    <circle cx="850" cy="220" r="3"></circle>
    <circle cx="1000" cy="180" r="3"></circle>
    <circle cx="1150" cy="240" r="3"></circle>
    <circle cx="1300" cy="200" r="3"></circle>
    <circle cx="1450" cy="260" r="3"></circle>

    <!-- Row 2 -->
    <circle cx="120" cy="350" r="3"></circle>
    <circle cx="300" cy="300" r="3"></circle>
    <circle cx="480" cy="360" r="3"></circle>
    <circle cx="660" cy="320" r="3"></circle>
    <circle cx="840" cy="380" r="3"></circle>
    <circle cx="1020" cy="340" r="3"></circle>
    <circle cx="1200" cy="400" r="3"></circle>
    <circle cx="1380" cy="360" r="3"></circle>

    <!-- Row 3 -->
    <circle cx="150" cy="600" r="3"></circle>
    <circle cx="330" cy="550" r="3"></circle>
    <circle cx="510" cy="610" r="3"></circle>
    <circle cx="690" cy="570" r="3"></circle>
    <circle cx="870" cy="630" r="3"></circle>
    <circle cx="1050" cy="590" r="3"></circle>
    <circle cx="1230" cy="650" r="3"></circle>
    <circle cx="1410" cy="610" r="3"></circle>

  </g>

</svg>